<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quicklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
		<header>
			<img src="/assets/logo.svg" alt="Logo quicklist">
			<span id="nome-logo">quicklist</span>
		</header>
		<main>
			<div>
				<a href="#" id="btn-voltar" class="link-button">
					&larr; Voltar
				</a>
				<h1>Compras da semana</h1>
			</div>
		
			<form>
				<input type="text" placeholder="Adicione um novo item" required>
				<button type="submit">Adicionar item</button>
			</form>
			<ul id="lista-compras">
				<li class="item-lista">
					<input type="checkbox" id="cafe-preto" />
					<label for="cafe-preto">Café preto</label>
					<button type="button" class="btn-delete">
						<img src="/assets/btn_delete.svg" alt="Remover item" />
					</button>
				</li>
				<li class="item-lista">
					<input type="checkbox" id="suco-de-laranja" />
					<label for="suco-de-laranja">Suco de laranja</label>
					<button type="button" class="btn-delete">
						<img src="/assets/btn_delete.svg" alt="Remover item" />
					</button>
				</li>
				<li class="item-lista">
					<input type="checkbox" id="bolacha" />
					<label for="bolacha">Bolacha</label>
					<button type="button" class="btn-delete">
						<img src="/assets/btn_delete.svg" alt="Remover item" />
					</button>
				</li>
			</ul>
		
		</main>
	</div>
  
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quicklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
		<header>
			<img src="/assets/logo.svg" alt="Logo quicklist">
			<span id="logo-name">quicklist</span>
		</header>

		<main>
				<a href="#" id="btn-back" aria-label="Voltar para tela inicial">
					<- Voltar
				</a>
				<h1 id="weekly-shopping">Compras da semana</h1>
		
			<form id="shopping-list-form">
				<input type="text" placeholder="Adicione um novo item" id="new-item-input" required>
				<button type="submit" id="button-add-item" aria-label="Botão de adicionar item na lista de compras da semana">Adicionar item</button>
			</form>
			
			<ul class="shopping-list">
			</ul>

			<div id="alert" class="alert-is-hidden" role="alert">
				<div class="alert-content">
					<img src="/assets/warning-circle-filled.svg" alt="imagem de alerta">
					<p class="text-alert">Item removido com sucesso</p>
				</div>
				
				<button type="button" class="btn-fechar-alerta alert-close-btn">
					<img src="/assets/delete-small.svg" alt="Botão de fechar alerta de item adicionado com sucesso">
				</button>
				<div class="alert-progress"></div>

			</div>

		</main>

	</div>
  
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quicklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <img src="/images/logo.svg" alt="Logo quicklist">
    <span>quicklist</span>
  </header>

  <main>

    <div>
      <a href="#" id="btn-voltar" class="link-button">
        &larr; Voltar
      </a>
      <h1>Compras da semana</h1>
    </div>
    
    <form>
      <input type="text" placeholder="Adicione um novo item" required>
      <button type="submit">Adicionar item</button>
    </form>

    <ul id="lista-compras">
      <li>Pão de forma</li>
      <li>Café Preto</li>
      <li>Suco de Laranja</li>
      <li>Bolacha</li>
    </ul>
    
  </main>
  
  <script src="script.js"></script>
</body>
</html>
